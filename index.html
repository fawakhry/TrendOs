<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrendOS Operations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app">
  <section id="loginView" class="card login-card">
    <h1>TrendOS Operations</h1>
    <p>تسجيل دخول الموظفين</p>

    <label>اسم المستخدم</label>
    <input id="username" placeholder="مثال: وائل">

    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="0000">

    <button id="loginBtn" class="primary">دخول</button>
    <p id="loginMsg" class="msg"></p>
  </section>

  <section id="mainView" class="hidden">
    <header class="topbar">
      <div>
        <h2 id="welcomeTitle">TrendOS</h2>
        <p id="roleLabel"></p>
      </div>
      <div class="top-actions">
        <button id="refreshBtn" class="ghost">تحديث</button>
        <button id="changePassBtn" class="ghost">تغيير كلمة المرور</button>
        <button id="logoutBtn" class="danger">خروج</button>
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>

    <section id="addOrderCard" class="card hidden">
      <div class="table-tools">
        <h3>إضافة أوردر جديد</h3>
        <span id="addOrderStatus"></span>
      </div>

      <div class="hint strong-hint">
        ابدأ بكتابة أول حرف من اسم الشات أو الرقم، واختار العميل من النتائج لتفادي خطأ كتابة الاسم أو الرقم.
      </div>

      <div class="form-grid">
        <div class="suggest-box">
          <label>اسم العميل / الشات</label>
          <input id="newCustomerName" placeholder="مثال: عميل خارجي / اسم المكتب" autocomplete="off">
          <div id="customerSuggestions" class="suggestions hidden"></div>
        </div>

        <div>
          <label>رقم العميل الخارجي</label>
          <input id="newCustomerPhone" inputmode="tel" placeholder="مثال: 01000000000">
        </div>

        <div>
          <label>نوع العميل</label>
          <input id="newCustomerType" placeholder="يتحدد تلقائياً عند اختيار العميل">
        </div>

        <div>
          <label>القسم</label>
          <select id="newDepartment">
            <option>طباعة</option>
            <option>ليزر</option>
            <option>مكبس</option>
            <option>متعدد الأقسام</option>
          </select>
        </div>

        <div class="wide">
          <label>اسم البند / نوع الشغل</label>
          <input id="newItemName" placeholder="مثال: شيت صور 10×15 / قص ليزر / مكبس">
        </div>

        <div>
          <label>الكمية</label>
          <input id="newQty" type="number" min="1" value="1">
        </div>

        <div>
          <label>الأولوية</label>
          <select id="newPriority">
            <option>عاجل</option>
            <option>عادي</option>
            <option>مؤجل</option>
          </select>
        </div>

        <div>
          <label>الحالة</label>
          <select id="newStatus">
            <option>طلب جديد</option>
            <option>جاهز للطباعة</option>
            <option>بدأ التنفيذ</option>
          </select>
        </div>

        <div>
          <label>مسؤول القسم</label>
          <input id="newAssignedTo" placeholder="يتحدد تلقائياً حسب القسم">
        </div>

        <div class="wide">
          <label>ملاحظات</label>
          <input id="newNotes" placeholder="أي تفاصيل إضافية">
        </div>
      </div>

      <button id="createOrderBtn" class="primary">إضافة الأوردر</button>
    </section>

    <section class="card">
      <div class="table-tools">
        <h3 id="screenTitle">الأوردرات</h3>
        <span id="loadingText"></span>
      </div>

      <div id="currentOrderBar" class="current-order hidden"></div>

      <div id="statsBar" class="stats"></div>

      <div class="filters">
        <input id="tableSearch" placeholder="بحث برقم الأوردر / اسم العميل / رقم العميل / البند">
        <select id="statusFilter">
          <option value="">كل الحالات</option>
          <option>طلب جديد</option>
          <option>جاهز للطباعة</option>
          <option>بدأ التنفيذ</option>
          <option>تحت التنفيذ</option>
          <option>تم التنفيذ</option>
          <option>جاهز للاستلام</option>
          <option>تم التسليم</option>
          <option>مشكلة</option>
          <option>متوقف</option>
        </select>
        <select id="priorityFilter">
          <option value="">كل الأولويات</option>
          <option>عاجل</option>
          <option>عادي</option>
          <option>مؤجل</option>
        </select>
      </div>

      <div class="table-wrap">
        <table id="ordersTable"><thead></thead><tbody></tbody></table>
      </div>
    </section>
  </section>

  <section id="passwordModal" class="modal hidden">
    <div class="modal-card">
      <h2>تغيير كلمة المرور</h2>

      <label>كلمة المرور القديمة</label>
      <input id="oldPassword" type="password">

      <label>كلمة المرور الجديدة</label>
      <input id="newPassword" type="password">

      <label>تأكيد كلمة المرور الجديدة</label>
      <input id="confirmPassword" type="password">

      <div class="row">
        <button id="savePassBtn" class="primary">حفظ</button>
        <button id="cancelPassBtn" class="ghost">إلغاء</button>
      </div>

      <p id="passMsg" class="msg"></p>
    </div>
  </section>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
