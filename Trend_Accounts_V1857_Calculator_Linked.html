<style>
:root{--g:#0b5b46;--g2:#0f7b5b;--bg:#edf6f1;--line:#d8e3dd;--danger:#c62828;--ok:#16794c;--warn:#9a6b00;--muted:#667870;--soft:#f7fbf8}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:#10231d}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(120deg,#dcefe6,#fff)}.login-card{width:min(980px,96vw);display:grid;grid-template-columns:1fr 1.25fr;box-shadow:0 16px 40px #0002;background:white;border-radius:14px;overflow:hidden}.brand{background:var(--g);color:white;padding:44px;text-align:center}.logo{font-size:70px;background:white;color:#23d16f;width:120px;height:120px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}.brand h1{font-size:34px;margin:10px 0 6px}.brand p{font-size:20px;margin:0;opacity:.92}.form{padding:48px}.form h2{color:var(--g);font-size:32px;margin:0 0 35px}.field{margin-bottom:22px}.field label{display:block;margin-bottom:8px;color:#446}.field select,.field input{width:100%;padding:13px;border:0;border-bottom:3px solid #96c0aa;background:#f7faf8;font-size:18px}.btn{border:0;background:var(--g2);color:white;padding:11px 18px;border-radius:5px;cursor:pointer;font-weight:bold;font-size:15px}.btn.secondary{background:white;color:var(--g);border:1px solid var(--g2)}.btn.danger{background:var(--danger)}.btn.gray{background:#789}.btn:disabled{opacity:.45;cursor:not-allowed}.app{display:none;min-height:100vh}.top{min-height:58px;background:var(--g);color:white;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:2}.top .user{margin-right:auto;background:#074635;padding:8px 14px;border-radius:4px}.menu{display:flex;height:100%;flex-wrap:wrap}.menu-item{position:relative;padding:18px 16px;cursor:pointer}.menu-item:hover{background:#0f6e55}.dropdown{display:none;position:absolute;top:58px;right:0;background:var(--g);min-width:230px;box-shadow:0 8px 24px #0004;border:1px solid #9cc;z-index:5}.menu-item:hover .dropdown{display:block}.dropdown a{display:block;color:white;text-decoration:none;padding:11px 16px;border-bottom:1px solid #ffffff22;white-space:nowrap}.dropdown a:hover{background:#0d7157}.layout{display:grid;grid-template-columns:250px 1fr;gap:18px;padding:18px}.side{background:#0b4d3b;color:white;border-radius:10px;padding:18px;min-height:calc(100vh - 94px)}.side .avatar{font-size:48px;background:white;color:#2bd26f;border-radius:50%;width:84px;height:84px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center}.side h3{text-align:center;margin:6px 0}.side .role{text-align:center;color:#cde;margin-bottom:10px}.side button{width:100%;margin-top:10px}.content{background:white;border-radius:10px;padding:18px;box-shadow:0 2px 14px #0001;min-height:78vh}.cards{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-bottom:18px}.card{background:#f6faf8;border:1px solid var(--line);border-radius:10px;padding:16px}.card b{display:block;font-size:22px;margin-top:8px;color:var(--g)}.card.profit{background:#fff7df}.hidden{display:none!important}table{width:100%;border-collapse:collapse;background:white;margin-top:12px}th,td{border:1px solid var(--line);padding:8px;text-align:right;vertical-align:middle}th{background:#eef6f2;color:#244}.small-input{width:84px;padding:7px}.wide{width:100%;padding:8px}input,select,textarea{font-family:Tahoma,Arial,sans-serif}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.section-title{color:var(--g);margin:4px 0 12px;border-bottom:2px solid #dbece4;padding-bottom:8px}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#eaf3ef;color:#0b5b46;font-weight:bold}.badge.wait{background:#fff3cd;color:#8a6500}.badge.ok{background:#dff4e8;color:#0b6b3c}.alert{background:#fff3cd;border:1px solid #ffe08a;padding:10px;border-radius:8px;margin:8px 0}.success{background:#e5f7ec;border-color:#b8e8ca}.print-invoice{background:white;border:1px solid #999;padding:18px;margin-top:15px}.muted{color:var(--muted);font-size:13px}.readonly{background:#f0f3f2;color:#555}.tabs{display:flex;gap:8px;margin:12px 0}.tab{padding:9px 14px;border:1px solid var(--line);background:#f5f8f6;cursor:pointer;border-radius:6px}.tab.active{background:var(--g);color:white}.ltr{direction:ltr;text-align:left}@media(max-width:900px){.login-card{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.dropdown{position:static}.menu-item:hover .dropdown{display:block}}
.embedded-mode .top{position:sticky}.embedded-mode .layout{padding:10px;grid-template-columns:220px 1fr}.embedded-mode .side{min-height:calc(100vh - 80px)}.embedded-mode .content{min-height:calc(100vh - 80px)}.mode-note{background:#eaf8f2;border:1px solid #bfe6d5;padding:10px;border-radius:8px;margin:0 0 12px;color:#075f49;font-weight:bold}.approval-only{background:#f7fbff}.no-profit .profit,.no-profit .diaa-profit{display:none!important}
</style>
</head>
<body>
<div class="login" id="login">
  <div class="login-card">
    <div class="brand"><div class="logo">🛒</div><h1>Trend Accounts</h1><p>Version 1857 Linked Patch 16</p><br><p>إدارة الحسابات والمخازن ونقاط البيع</p></div>
    <div class="form"><h2>تسجيل الدخول</h2><div class="field"><label>اسم المستخدم</label><select id="userSelect"><option>ضياء</option><option>رحمه</option><option>ريفان</option><option>وائل</option><option>جابر</option></select></div><div class="field"><label>كلمة المرور</label><input value="admin" type="password"></div><button class="btn" onclick="login()">دخول</button></div>
  </div>
</div>
<div class="app" id="app">
  <div class="top"><div class="menu" id="menu"></div><div class="user" id="userBadge"></div></div>
  <div class="layout">
    <aside class="side"><div class="avatar">🛒</div><h3 id="sideUser"></h3><div class="role" id="sideRole"></div><button class="btn secondary" onclick="showPage('sales')">فاتورة مبيعات</button><button class="btn secondary" onclick="showPage('purchases')">فاتورة مشتريات</button><button class="btn secondary" onclick="showPage('bom')">مكونات الصنف</button><button class="btn secondary diaa-only" onclick="showPage('reports')">الأرباح والتقارير</button><button class="btn secondary diaa-only" onclick="showPage('link')">ربط الحسابات</button><button class="btn danger" onclick="location.reload()">خروج</button></aside>
    <main class="content">
      <section id="dashboard"></section><section id="sales" class="hidden"></section><section id="laserCalc" class="hidden"></section><section id="purchases" class="hidden"></section><section id="bom" class="hidden"></section><section id="reports" class="hidden"></section><section id="link" class="hidden"></section>
    </main>
  </div>
</div>
<script>
const roles={"ضياء":{role:"مدير عام",diaa:true,profit:true,reports:true,approve:true,send:true,sales:"all",purchases:"all"},"رحمه":{role:"مبيعات ومشتريات",diaa:false,profit:false,reports:false,approve:true,send:true,sales:"all",purchases:"all"},"ريفان":{role:"مبيعات ومشتريات",diaa:false,profit:false,reports:false,approve:true,send:true,sales:"all",purchases:"all"},"وائل":{role:"قسم الطباعة",diaa:false,profit:false,reports:false,approve:false,send:false,sales:"طباعة",purchases:"طباعة"},"جابر":{role:"قسم الليزر",diaa:false,profit:false,reports:false,approve:false,send:false,sales:"ليزر",purchases:"ليزر"}};
let currentUser="ضياء", invoiceStatus="في انتظار الاعتماد", trendAccountsMode="dashboard", trendHideProfitReports=false;
const LS="trend_accounts_v1857_linked";
let db=loadDb();
function ensureCalc(){if(!db.calcLines){db.calcLines=[{matKey:"wood",l:20,w:30,count:1,waste:10,sell:80},{matKey:"acr",l:20,w:30,count:1,waste:10,sell:100},{matKey:"dc",l:20,w:10,count:1,waste:15,sell:70}]};}
function freshDb(){return {settings:{apiEndpoint:"",lastSync:"لم يتم"},materials:{wood:{code:"RM-WOOD",name:"خشب MDF",section:"ليزر",type:"مساحة",sheetL:120,sheetW:240,sheetCost:300,stockSheets:10,waste:10},acr:{code:"RM-ACR",name:"أكريلك شفاف",section:"ليزر",type:"مساحة",sheetL:120,sheetW:240,sheetCost:900,stockSheets:5,waste:10},dc:{code:"RM-DC",name:"دابل كالر",section:"ليزر",type:"مساحة",sheetL:60,sheetW:120,sheetCost:250,stockSheets:8,waste:15},mug:{code:"RM-MUG",name:"مج خام",section:"طباعة",type:"قطعة",sheetL:1,sheetW:1,sheetCost:35,stockSheets:100,waste:0},paper:{code:"RM-PAPER",name:"ورق سبلميشن",section:"طباعة",type:"قطعة",sheetL:1,sheetW:1,sheetCost:3,stockSheets:500,waste:0}},bom:[{itemCode:"FG-LZ-001",item:"بصمة ليزر مركبة",section:"ليزر",band:1,matKey:"wood",l:20,w:30,count:1,waste:10,sell:80},{itemCode:"FG-LZ-001",item:"بصمة ليزر مركبة",section:"ليزر",band:2,matKey:"acr",l:20,w:30,count:1,waste:10,sell:100},{itemCode:"FG-LZ-001",item:"بصمة ليزر مركبة",section:"ليزر",band:3,matKey:"dc",l:20,w:10,count:1,waste:15,sell:70},{itemCode:"FG-PR-001",item:"مج ديجتال",section:"طباعة",band:1,matKey:"mug",l:1,w:1,count:1,waste:0,sell:100}],invoices:[{id:"INV-1520",orderNo:1520,customer:"عميل نقدي",paid:100,status:"في انتظار الاعتماد",approvedBy:"",sent:false}],lines:[{invoiceId:"INV-1520",orderNo:1520,section:"طباعة",emp:"وائل",itemCode:"FG-PR-001",item:"مج ديجتال",band:1,matKey:"mug",l:1,w:1,count:2,waste:0,qty:2,sell:200,status:"تم التنفيذ"},{invoiceId:"INV-1520",orderNo:1520,section:"ليزر",emp:"جابر",itemCode:"FG-LZ-001",item:"بصمة ليزر مركبة",band:1,matKey:"wood",l:20,w:30,count:1,waste:10,qty:1,sell:80,status:"تم التنفيذ"},{invoiceId:"INV-1520",orderNo:1520,section:"ليزر",emp:"جابر",itemCode:"FG-LZ-001",item:"بصمة ليزر مركبة",band:2,matKey:"acr",l:20,w:30,count:1,waste:10,qty:1,sell:100,status:"تم التنفيذ"},{invoiceId:"INV-1520",orderNo:1520,section:"ليزر",emp:"جابر",itemCode:"FG-LZ-001",item:"بصمة ليزر مركبة",band:3,matKey:"dc",l:20,w:10,count:1,waste:15,qty:1,sell:70,status:"تم التنفيذ"}],purchases:[{id:"PUR-1",section:"طباعة",emp:"وائل",supplier:"حسام",item:"مجات خام",qty:20,unit:35,status:"في انتظار الاعتماد"},{id:"PUR-2",section:"ليزر",emp:"جابر",supplier:"مورد خشب",item:"شيت خشب MDF",qty:2,unit:300,status:"في انتظار الاعتماد"}],ledger:[]}}
function loadDb(){try{return JSON.parse(localStorage.getItem(LS))||freshDb()}catch(e){return freshDb()}}function saveDb(){localStorage.setItem(LS,JSON.stringify(db));}
function login(){ensureCalc();currentUser=document.getElementById('userSelect').value;document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';document.getElementById('userBadge').textContent='المستخدم: '+currentUser;document.getElementById('sideUser').textContent=currentUser;document.getElementById('sideRole').textContent=roles[currentUser].role;renderMenu();renderAll();showPage('dashboard');}
function renderMenu(){let r=roles[currentUser];let items=[['الأصناف',['مكونات الصنف','قائمة الأصناف']],['المخازن',['المواد الخام']],['المشتريات',['فاتورة مشتريات']],['المبيعات',['فاتورة مبيعات','فاتورة مجمعة','حاسبة جابر']],['الحسابات',['ربط الحسابات']],['التقارير',['ربحية فاتورة','قائمة الدخل','قفلة اليوم']]];if(!r.diaa){items=items.filter(x=>!['الحسابات','التقارير'].includes(x[0]));}if(r.sales!=='all')items=items.filter(x=>['المبيعات','المشتريات','الأصناف'].includes(x[0]));document.getElementById('menu').innerHTML=items.map(x=>`<div class="menu-item">${x[0]}⌄<div class="dropdown">${x[1].map(y=>`<a href="#" onclick="route('${y}')">${y}</a>`).join('')}</div></div>`).join('');document.querySelectorAll('.diaa-only').forEach(e=>e.style.display=r.diaa?'block':'none');}
function route(y){if(y.includes('حاسبة'))showPage('laserCalc');else if(y.includes('مبيعات')||y.includes('مجمعة'))showPage('sales');else if(y.includes('مشتريات'))showPage('purchases');else if(y.includes('مكونات')||y.includes('أصناف'))showPage('bom');else if(y.includes('ربط'))showPage('link');else if(y.includes('ربحية')||y.includes('دخل')||y.includes('اليوم'))showPage('reports');else showPage('dashboard')}
function showPage(id){['dashboard','sales','laserCalc','purchases','bom','reports','link'].forEach(p=>document.getElementById(p).classList.add('hidden'));if((id==='reports'||id==='link')&&!roles[currentUser].diaa){alert('الأرباح والتقارير والربط تظهر عند ضياء فقط');id='dashboard'}document.getElementById(id).classList.remove('hidden');}
function money(n){n=Number(n)||0;return (Math.round(n*100)/100).toLocaleString('ar-EG',{minimumFractionDigits:2})}function canDiaa(){return roles[currentUser].diaa && !trendHideProfitReports}function matCost(k,l,w,count,waste){let m=db.materials[k];if(!m)return {area:0,cost:0,unit:0};if(m.type==='قطعة'){return {area:count,cost:m.sheetCost*count*(1+waste/100),unit:m.sheetCost}}let sheetArea=m.sheetL*m.sheetW, unit=m.sheetCost/sheetArea, area=l*w*count*(1+waste/100);return {area,cost:area*unit,unit};}
function lineCost(x){return matCost(x.matKey,x.l,x.w,x.count||x.qty,x.waste).cost}function invoice(){return db.invoices[0]}function fullTotals(){let sale=db.lines.reduce((s,x)=>s+Number(x.sell||0),0),cost=db.lines.reduce((s,x)=>s+lineCost(x),0);return {sale,cost,profit:sale-cost,paid:invoice().paid,balance:sale-invoice().paid}}
function visibleLines(){let p=roles[currentUser].sales;return p==='all'?db.lines:db.lines.filter(x=>x.section===p||x.emp===currentUser)}function visiblePurchases(){let p=roles[currentUser].purchases;return p==='all'?db.purchases:db.purchases.filter(x=>x.section===p||x.emp===currentUser)}
function renderAll(){ensureCalc();renderDashboard();renderSales();renderLaserCalc();renderPurchases();renderBom();renderReports();renderLink();}
function renderDashboard(){let t=fullTotals();document.getElementById('dashboard').innerHTML=`<h2 class="section-title">لوحة التحكم</h2><div class="cards"><div class="card">إجمالي فاتورة التجربة<b>${money(t.sale)}</b></div><div class="card">فاتورة مشتريات معلقة<b>${db.purchases.filter(x=>x.status.includes('انتظار')).length}</b></div><div class="card">حالة الفاتورة<b>${invoice().status}</b></div><div class="card profit diaa-only">ربح الفاتورة<b>${money(t.profit)}</b></div></div><div class="alert success">تقفيل الأقسام لا يعرض أرباح أو تقارير. الأرباح والتقارير تظهر عند ضياء فقط.</div>`;document.querySelectorAll('.diaa-only').forEach(e=>e.style.display=canDiaa()?'block':'none');}
function renderSales(){let r=roles[currentUser], rows=visibleLines(), t=fullTotals();document.getElementById('sales').innerHTML=`<h2 class="section-title">فاتورة مبيعات مجمعة</h2><div class="toolbar"><span class="badge">${invoice().id}</span><span class="badge">أوردر ${invoice().orderNo}</span><span class="badge wait">${invoice().status}</span><span class="badge">${invoice().customer}</span></div><table><thead><tr><th>القسم</th><th>الموظف</th><th>الصنف</th><th>الباند/الخامة</th><th>الطول</th><th>العرض</th><th>العدد</th><th>الهالك %</th><th>سعر بيع الباند</th>${canDiaa()?'<th>تكلفة الباند</th><th>ربح الباند</th>':''}<th>الحالة</th></tr></thead><tbody>${rows.map((x,i)=>rowSales(x,i)).join('')}</tbody></table><div class="toolbar"><button class="btn" onclick="addSalesLine()">إضافة بند ${r.sales==='all'?'':'قسم '+r.sales}</button>${r.approve?'<button class="btn" onclick="approveInvoice()">اعتماد الفاتورة</button>':''}${r.send?'<button class="btn secondary" onclick="sendInvoice()">إرسال الفاتورة الكاملة للعميل</button>':''}<button class="btn gray" onclick="printInvoice()">عرض فاتورة العميل</button></div><div class="cards"><div class="card">إجمالي الفاتورة<b>${money(t.sale)}</b></div><div class="card">المدفوع<b>${money(t.paid)}</b></div><div class="card">الباقي<b>${money(t.balance)}</b></div>${canDiaa()?`<div class="card profit">إجمالي التكلفة<b>${money(t.cost)}</b></div><div class="card profit">الربح<b>${money(t.profit)}</b></div>`:''}</div><div id="invoicePrint"></div>`;}
function rowSales(x,i){let real=db.lines.indexOf(x), c=lineCost(x), readonly=!canDiaa()&&!(x.emp===currentUser||x.section===roles[currentUser].sales);let editableDims=(x.section==='ليزر'&&(canDiaa()||x.emp===currentUser));let editableSell=canDiaa()||roles[currentUser].approve;return `<tr><td>${x.section}</td><td>${x.emp}</td><td>${x.item}</td><td>${db.materials[x.matKey]?.name||x.matKey}</td><td>${editableDims?`<input class="small-input" value="${x.l}" onchange="updLine(${real},'l',this.value)">`:x.l}</td><td>${editableDims?`<input class="small-input" value="${x.w}" onchange="updLine(${real},'w',this.value)">`:x.w}</td><td><input class="small-input" value="${x.count}" onchange="updLine(${real},'count',this.value)" ${readonly?'disabled':''}></td><td>${editableDims||canDiaa()?`<input class="small-input" value="${x.waste}" onchange="updLine(${real},'waste',this.value)">`:x.waste}</td><td>${editableSell?`<input class="small-input" value="${x.sell}" onchange="updLine(${real},'sell',this.value)">`:money(x.sell)}</td>${canDiaa()?`<td>${money(c)}</td><td>${money(x.sell-c)}</td>`:''}<td>${x.status}</td></tr>`}
function updLine(i,k,v){db.lines[i][k]=['l','w','count','waste','sell'].includes(k)?Number(v):v;saveDb();renderAll();showPage('sales')}
function addSalesLine(){let sec=roles[currentUser].sales==='all'?'طباعة':roles[currentUser].sales;if(sec==='ليزر'){db.lines.push({invoiceId:'INV-1520',orderNo:1520,section:'ليزر',emp:'جابر',itemCode:'FG-LZ-001',item:'بند ليزر بالمقاس',band:db.lines.length+1,matKey:'wood',l:20,w:30,count:1,waste:10,qty:1,sell:80,status:'تم التنفيذ'});}else{db.lines.push({invoiceId:'INV-1520',orderNo:1520,section:'طباعة',emp:'وائل',itemCode:'FG-PR-001',item:'بند طباعة جديد',band:1,matKey:'mug',l:1,w:1,count:1,waste:0,qty:1,sell:100,status:'تم التنفيذ'});}invoice().status='في انتظار الاعتماد';saveDb();renderAll();showPage('sales')}
function approveInvoice(){invoice().status='معتمدة';invoice().approvedBy=currentUser;db.ledger.push({type:'اعتماد فاتورة مبيعات',ref:invoice().id,user:currentUser,total:fullTotals().sale,cost:fullTotals().cost,profit:fullTotals().profit,date:new Date().toLocaleString('ar-EG')});saveDb();renderAll();showPage('sales')}
function sendInvoice(){if(invoice().status!=='معتمدة'){alert('لا يمكن إرسال الفاتورة قبل الاعتماد');return}invoice().status='مرسلة للعميل';invoice().sent=true;db.ledger.push({type:'إرسال فاتورة للعميل',ref:invoice().id,user:currentUser,total:fullTotals().sale,date:new Date().toLocaleString('ar-EG')});saveDb();renderAll();showPage('sales');printInvoice();}
function printInvoice(){let t=fullTotals();let summary={};db.lines.forEach(x=>{let key=x.item;summary[key]=(summary[key]||0)+Number(x.sell||0)});document.getElementById('invoicePrint').innerHTML=`<div class="print-invoice"><h3>فاتورة عميل</h3><p>فاتورة ${invoice().id} — أوردر ${invoice().orderNo}</p><table><tr><th>البيان</th><th>الإجمالي</th></tr>${Object.entries(summary).map(([k,v])=>`<tr><td>${k}</td><td>${money(v)}</td></tr>`).join('')}<tr><th>الإجمالي</th><th>${money(t.sale)}</th></tr><tr><th>المدفوع</th><th>${money(t.paid)}</th></tr><tr><th>الباقي</th><th>${money(t.balance)}</th></tr></table><p class="muted">الفاتورة المرسلة للعميل مجمعة، ولا تعرض التكلفة أو الربح أو أسماء الموظفين.</p></div>`}

function renderLaserCalc(){
  ensureCalc();
  let allowed=(roles[currentUser].sales==='ليزر'||canDiaa());
  if(!allowed){document.getElementById('laserCalc').innerHTML='<h2 class="section-title">حاسبة الليزر</h2><div class="alert danger">حاسبة الليزر متاحة لجابر وضياء فقط.</div>';return;}
  let rows=db.calcLines||[];
  let totalSell=rows.reduce((s,x)=>s+Number(x.sell||0),0), totalCost=rows.reduce((s,x)=>s+matCost(x.matKey,x.l,x.w,x.count,x.waste).cost,0), totalArea=rows.reduce((s,x)=>s+matCost(x.matKey,x.l,x.w,x.count,x.waste).area,0);
  document.getElementById('laserCalc').innerHTML=`<h2 class="section-title">حاسبة جابر لحساب شغل الليزر قبل التنفيذ</h2>
  <div class="alert success">الحاسبة مربوطة بمكونات الصنف ومقاسات الشيتات التي يعدلها ضياء. جابر يدخل المقاسات والعدد والهالك وسعر البيع، ثم يحول البنود لفاتورة العميل عند الموافقة.</div>
  <table><tr><th>الخامة</th><th>مقاس الشيت الحالي</th><th>طول القطعة</th><th>عرض القطعة</th><th>عدد القطع</th><th>هالك %</th><th>المساحة المحسوبة</th><th>سعر البيع للعميل</th>${canDiaa()?'<th>التكلفة</th><th>الربح</th>':''}<th>حذف</th></tr>
  ${rows.map((x,i)=>rowCalc(x,i)).join('')}</table>
  <div class="toolbar"><button class="btn" onclick="addCalcLine()">إضافة خامة للحساب</button><button class="btn secondary" onclick="sendCalcToInvoice()">تحويل الحسبة إلى فاتورة العميل</button><button class="btn gray" onclick="clearCalc()">تفريغ الحاسبة</button></div>
  <div class="cards"><div class="card">إجمالي سعر العميل<b>${money(totalSell)}</b></div><div class="card">إجمالي المساحة بعد الهالك<b>${money(totalArea)} سم²</b></div>${canDiaa()?`<div class="card profit">إجمالي التكلفة<b>${money(totalCost)}</b></div><div class="card profit">الربح المتوقع<b>${money(totalSell-totalCost)}</b></div>`:''}</div>
  <div class="alert">ملاحظة: التحويل للفاتورة لا يعتمدها ولا يرسلها للعميل. الاعتماد والإرسال من ضياء/رحمه/ريفان فقط.</div>`;
}
function rowCalc(x,i){let m=db.materials[x.matKey]||db.materials.wood, c=matCost(x.matKey,x.l,x.w,x.count,x.waste);let mats=Object.entries(db.materials).filter(([k,m])=>m.section==='ليزر').map(([k,m])=>`<option value="${k}" ${k===x.matKey?'selected':''}>${m.name}</option>`).join('');return `<tr><td><select onchange="updCalc(${i},'matKey',this.value)">${mats}</select></td><td>${m.sheetL}×${m.sheetW}</td><td><input class="small-input" value="${x.l}" onchange="updCalc(${i},'l',this.value)"></td><td><input class="small-input" value="${x.w}" onchange="updCalc(${i},'w',this.value)"></td><td><input class="small-input" value="${x.count}" onchange="updCalc(${i},'count',this.value)"></td><td><input class="small-input" value="${x.waste}" onchange="updCalc(${i},'waste',this.value)"></td><td>${money(c.area)} سم²</td><td><input class="small-input" value="${x.sell}" onchange="updCalc(${i},'sell',this.value)"></td>${canDiaa()?`<td>${money(c.cost)}</td><td>${money((Number(x.sell)||0)-c.cost)}</td>`:''}<td><button class="btn gray" onclick="delCalc(${i})">حذف</button></td></tr>`}
function updCalc(i,k,v){ensureCalc();db.calcLines[i][k]=['l','w','count','waste','sell'].includes(k)?Number(v):v;saveDb();renderAll();showPage('laserCalc')}
function addCalcLine(){ensureCalc();db.calcLines.push({matKey:'wood',l:20,w:30,count:1,waste:10,sell:80});saveDb();renderAll();showPage('laserCalc')}
function delCalc(i){ensureCalc();db.calcLines.splice(i,1);saveDb();renderAll();showPage('laserCalc')}
function clearCalc(){db.calcLines=[];saveDb();renderAll();showPage('laserCalc')}
function sendCalcToInvoice(){ensureCalc();let n=db.lines.length+1;db.calcLines.forEach((x,idx)=>{let m=db.materials[x.matKey]||{};db.lines.push({invoiceId:'INV-1520',orderNo:1520,section:'ليزر',emp:'جابر',itemCode:'FG-LZ-CALC',item:'شغل ليزر محسوب بالحاسبة',band:n+idx,matKey:x.matKey,l:x.l,w:x.w,count:x.count,waste:x.waste,qty:1,sell:x.sell,status:'تم التنفيذ'});});invoice().status='في انتظار الاعتماد';db.ledger.push({type:'تحويل حاسبة جابر إلى فاتورة',ref:invoice().id,user:currentUser,total:db.calcLines.reduce((s,x)=>s+Number(x.sell||0),0),date:new Date().toLocaleString('ar-EG')});saveDb();renderAll();showPage('sales')}

function renderPurchases(){let rows=visiblePurchases();document.getElementById('purchases').innerHTML=`<h2 class="section-title">فاتورة مشتريات</h2><div class="alert">وائل وجابر يضيفوا مشتريات أقسامهم فقط. ضياء/رحمه/ريفان يعتمدوا الفاتورة قبل دخولها الحسابات.</div><table><tr><th>رقم</th><th>القسم</th><th>المستخدم</th><th>المورد</th><th>الصنف</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th><th>الحالة</th></tr>${rows.map(x=>`<tr><td>${x.id}</td><td>${x.section}</td><td>${x.emp}</td><td>${x.supplier}</td><td>${x.item}</td><td>${x.qty}</td><td>${money(x.unit)}</td><td>${money(x.qty*x.unit)}</td><td>${x.status}</td></tr>`).join('')}</table><div class="toolbar"><button class="btn" onclick="addPurchase()">إضافة فاتورة مشتريات</button>${roles[currentUser].approve?'<button class="btn secondary" onclick="approvePurchases()">اعتماد المشتريات الظاهرة</button>':''}</div>`}
function addPurchase(){let sec=roles[currentUser].purchases==='all'?'طباعة':roles[currentUser].purchases;db.purchases.push({id:'PUR-'+(db.purchases.length+1),section:sec,emp:currentUser,supplier:sec==='ليزر'?'مورد ليزر':'مورد طباعة',item:sec==='ليزر'?'خامة ليزر':'خامة طباعة',qty:1,unit:100,status:'في انتظار الاعتماد'});saveDb();renderAll();showPage('purchases')}
function approvePurchases(){visiblePurchases().forEach(x=>{x.status='معتمدة';db.ledger.push({type:'اعتماد فاتورة مشتريات',ref:x.id,user:currentUser,total:x.qty*x.unit,date:new Date().toLocaleString('ar-EG')})});saveDb();renderAll();showPage('purchases')}
function renderBom(){let diaa=canDiaa();let rows=db.bom.map((b,i)=>{let m=db.materials[b.matKey], c=matCost(b.matKey,b.l,b.w,b.count,b.waste);return `<tr><td>${b.item}</td><td>${b.band}</td><td>${m.name}</td><td>${diaa?`<input class="small-input" title="طول الشيت" value="${m.sheetL}" onchange="updMat('${b.matKey}','sheetL',this.value)"> × <input class="small-input" title="عرض الشيت" value="${m.sheetW}" onchange="updMat('${b.matKey}','sheetW',this.value)">`:m.sheetL+'×'+m.sheetW}</td><td class="diaa-only">${diaa?`<input class="small-input" value="${m.sheetCost}" onchange="updMat('${b.matKey}','sheetCost',this.value)">`:''}</td><td>${diaa?`<input class="small-input" value="${b.l}" onchange="updBom(${i},'l',this.value)">`:b.l}</td><td>${diaa?`<input class="small-input" value="${b.w}" onchange="updBom(${i},'w',this.value)">`:b.w}</td><td>${diaa?`<input class="small-input" value="${b.count}" onchange="updBom(${i},'count',this.value)">`:b.count}</td><td>${diaa?`<input class="small-input" value="${b.waste}" onchange="updBom(${i},'waste',this.value)">`:b.waste}</td><td>${money(c.area)} ${m.type==='مساحة'?'سم²':'قطعة'}</td><td class="diaa-only">${money(c.cost)}</td><td>${diaa?`<input class="small-input" value="${b.sell}" onchange="updBom(${i},'sell',this.value)">`:money(b.sell)}</td></tr>`}).join('');document.getElementById('bom').innerHTML=`<h2 class="section-title">مكونات الصنف</h2><div class="alert ${diaa?'success':''}">${diaa?'ضياء يقدر يعدل طول وعرض الشيت أو اللوح، سعر الشيت، مقاسات الباند، الهالك، وسعر البيع.':'المقاسات والأسعار للتعديل عند ضياء فقط. يمكنك استخدام الصنف في الفاتورة حسب صلاحيتك.'}</div><table><tr><th>الصنف</th><th>رقم الباند</th><th>الخامة</th><th>مقاس الشيت / اللوح طول × عرض</th><th class="diaa-only">سعر الشيت</th><th>طول القطعة</th><th>عرض القطعة</th><th>عدد</th><th>هالك %</th><th>المساحة المخصومة</th><th class="diaa-only">التكلفة</th><th>سعر بيع الباند</th></tr>${rows}</table><div class="toolbar diaa-only"><button class="btn" onclick="addBomBand()">إضافة باند خامة جديد</button><button class="btn secondary" onclick="applyBomToInvoice()">تطبيق مكونات الصنف على الفاتورة</button></div>`;document.querySelectorAll('.diaa-only').forEach(e=>e.style.display=diaa?'':'none')}
function updMat(k,field,v){db.materials[k][field]=Number(v);saveDb();renderAll();showPage('bom')}function updBom(i,field,v){db.bom[i][field]=['l','w','count','waste','sell'].includes(field)?Number(v):v;saveDb();renderAll();showPage('bom')}function addBomBand(){db.bom.push({itemCode:'FG-LZ-001',item:'بصمة ليزر مركبة',section:'ليزر',band:db.bom.filter(x=>x.itemCode==='FG-LZ-001').length+1,matKey:'wood',l:10,w:10,count:1,waste:10,sell:30});saveDb();renderAll();showPage('bom')}function applyBomToInvoice(){db.lines=db.lines.filter(x=>!(x.itemCode==='FG-LZ-001'));db.bom.filter(x=>x.itemCode==='FG-LZ-001').forEach(b=>db.lines.push({invoiceId:'INV-1520',orderNo:1520,section:b.section,emp:'جابر',itemCode:b.itemCode,item:b.item,band:b.band,matKey:b.matKey,l:b.l,w:b.w,count:b.count,waste:b.waste,qty:1,sell:b.sell,status:'تم التنفيذ'}));invoice().status='في انتظار الاعتماد';saveDb();renderAll();showPage('sales')}
function renderReports(){let t=fullTotals();document.getElementById('reports').innerHTML=`<h2 class="section-title">الأرباح والتقارير — ضياء فقط</h2><div class="cards"><div class="card">إجمالي المبيعات<b>${money(t.sale)}</b></div><div class="card">إجمالي التكلفة<b>${money(t.cost)}</b></div><div class="card profit">مجمل الربح<b>${money(t.profit)}</b></div><div class="card profit">نسبة الربح<b>${money(t.sale?100*t.profit/t.sale:0)}%</b></div></div><table><tr><th>السجل</th><th>المرجع</th><th>المستخدم</th><th>الإجمالي</th><th>التاريخ</th></tr>${db.ledger.map(x=>`<tr><td>${x.type}</td><td>${x.ref}</td><td>${x.user}</td><td>${money(x.total||0)}</td><td>${x.date}</td></tr>`).join('')}</table>`}
function renderLink(){document.getElementById('link').innerHTML=`<h2 class="section-title">ربط النسخة مع برنامج الحسابات</h2><div class="alert success">النسخة تحفظ كل حركة في جداول داخلية بنفس أسماء برنامج الحسابات: الفواتير، بنود الفواتير، مكونات الصنف، المشتريات، وسجل القيود. يمكنك تصدير البيانات JSON أو CSV لاستخدامها في Apps Script/Sheets.</div><div class="field"><label>رابط Web App / Apps Script لاحقًا</label><input class="wide ltr" value="${db.settings.apiEndpoint}" onchange="db.settings.apiEndpoint=this.value;saveDb()" placeholder="https://script.google.com/macros/s/.../exec"></div><div class="toolbar"><button class="btn" onclick="downloadJson()">تصدير قاعدة الحسابات JSON</button><button class="btn secondary" onclick="downloadCsv()">تصدير بنود الفواتير CSV</button><button class="btn gray" onclick="resetDemo()">تصفير بيانات التجربة</button></div><table><tr><th>جدول الحسابات</th><th>عدد السجلات</th><th>مفتاح الربط</th></tr><tr><td>الفواتير</td><td>${db.invoices.length}</td><td>رقم الفاتورة + رقم الأوردر</td></tr><tr><td>بنود الفواتير</td><td>${db.lines.length}</td><td>رقم الفاتورة + كود الصنف + رقم الباند</td></tr><tr><td>مكونات الصنف</td><td>${db.bom.length}</td><td>كود الصنف + رقم الباند</td></tr><tr><td>المشتريات</td><td>${db.purchases.length}</td><td>رقم فاتورة المشتريات</td></tr><tr><td>سجل القيود</td><td>${db.ledger.length}</td><td>المرجع + نوع الحركة</td></tr></table>`}
function downloadJson(){download('trend_accounts_v1857_data.json',JSON.stringify(db,null,2),'application/json')}function downloadCsv(){let headers=['invoiceId','orderNo','section','emp','itemCode','item','band','material','l','w','count','waste','cost','sell','status'];let csv=[headers.join(',')].concat(db.lines.map(x=>headers.map(h=>`"${String(h==='material'?(db.materials[x.matKey]?.name||''):h==='cost'?lineCost(x):(x[h]??'')).replace(/"/g,'""')}"`).join(','))).join('\n');download('trend_accounts_invoice_lines.csv',csv,'text/csv')}function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function resetDemo(){if(confirm('تأكيد تصفير بيانات التجربة؟')){localStorage.removeItem(LS);db=freshDb();renderAll();showPage('dashboard')}}


// V1856 Patch 15 - دخول تلقائي من شاشة موظف TrendOS بدون يوزر وباسورد
function trendParam(name){try{return new URLSearchParams(location.search).get(name)||''}catch(e){return ''}}
function trendNormalizeArabic(v){return String(v||'').trim().replace(/ة/g,'ه').toLowerCase()}
function trendResolveUser(v){
  let key=trendNormalizeArabic(v);
  const map={
    'ضياء':'ضياء','diaa':'ضياء','deyaa':'ضياء',
    'رحمه':'رحمه','رحمة':'رحمه','rahma':'رحمه','rehma':'رحمه',
    'ريفان':'ريفان','revan':'ريفان','rivan':'ريفان',
    'وائل':'وائل','wael':'وائل','wael':'وائل',
    'جابر':'جابر','gaber':'جابر','jaber':'جابر'
  };
  return map[key] || v;
}

function trendNormalizePage(page){
  page=String(page||'dashboard');
  if(page==='sectionClose') return 'sales';
  if(page==='invoiceApproval') return 'sales';
  if(page==='laserCalc') return 'laserCalc';
  return page;
}
function trendModeNote(){
  if(trendAccountsMode==='sectionClose') return 'وضع تقفيل القسم: وائل وجابر يضيفوا بنود قسمهم فقط، بدون أرباح أو تقارير.';
  if(trendAccountsMode==='invoiceApproval') return 'وضع اعتماد الفاتورة: الاعتماد النهائي عند ضياء / رحمة / ريفان.';
  if(trendAccountsMode==='laserCalc') return 'حاسبة جابر: إدخال المقاسات والهالك وسعر البيع، ثم تحويل البنود لفاتورة في انتظار الاعتماد.';
  return '';
}
function applyTrendModeBanner(){
  const note=trendModeNote();
  const content=document.querySelector('.content');
  if(!content || !note) return;
  let el=document.getElementById('trendModeNote');
  if(!el){el=document.createElement('div');el.id='trendModeNote';el.className='mode-note';content.insertBefore(el,content.firstChild);}
  el.textContent=note;
}
function trendLoginAs(user,page){
  user=trendResolveUser(user||'');
  if(!roles[user]) return false;
  ensureCalc();
  currentUser=user;
  trendAccountsMode=trendParam('mode') || trendParam('page') || 'dashboard';
  trendHideProfitReports=(trendParam('hideProfits')==='1' || !roles[currentUser].diaa);
  document.body.classList.add('embedded-mode');
  if(trendHideProfitReports) document.body.classList.add('no-profit');
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userBadge').textContent='المستخدم: '+currentUser+' — دخول من TrendOS';
  document.getElementById('sideUser').textContent=currentUser;
  document.getElementById('sideRole').textContent=roles[currentUser].role;
  renderMenu();
  renderAll();
  applyTrendModeBanner();
  showPage(trendNormalizePage(page || 'dashboard'));
  return true;
}
function trendAutoLogin(){
  const from=trendParam('from');
  if(from!=='trendos') return;
  const user=trendParam('username') || trendParam('name') || 'ضياء';
  const page=trendParam('page') || 'dashboard';
  trendLoginAs(user,page);
}
trendAutoLogin();
